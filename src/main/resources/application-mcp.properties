# MCP Server Configuration

## Overview
This configuration sets up a Model Context Protocol (MCP) server that can communicate with the notification API.

## Endpoints
- `POST /mcp/notification` - Send a notification message
- `GET /mcp/notification/{id}` - Get specific notification by ID  
- `POST /mcp/health` - Health check endpoint

## Configuration Properties
The following properties need to be configured:

```properties
# Notification API configuration
noti.api.url=https://noti.skpsnm.com/api/v1/notification
noti.api.token=your-access-token-here
```

## Features
- RESTful API endpoints for MCP communication
- Integration with notification service
- Health check endpoint
- Error handling and logging

## Usage Example
```bash
# Send a notification
curl -X POST http://localhost:8080/mcp/notification \
  -H "Content-Type: application/json" \
  -d "Hello, this is a test notification!"

# Check health
curl -X POST http://localhost:8080/mcp/health
```