# Application configuration

# Server settings
server.port=${SERVER_PORT:8080}

# Logging
logging.level.com.example.notimcp=${LOGGING_LEVEL:DEBUG}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:DEBUG}

# Notification API settings
noti.api.url=${NOTI_API_URL:https://noti.skpsnm.com/api/v1/notification}
noti.api.token=${NOTI_API_TOKEN:your-access-token-here}

# JWT settings
jwt.secret=${JWT_SECRET:your-default-secret-key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# API Key settings
api.key=${API_KEY:your-default-api-key}spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.client.RestClientAutoConfiguration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration,org.springframework.boot.autoconfigure.web.client.RestClientAutoConfiguration
